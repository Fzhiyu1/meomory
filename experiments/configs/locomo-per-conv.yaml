experiments:
  # Conv 0
  - name: cosine-locomo-0
    dataset: LoCoMo-full-0
    method: cosine

  - name: dgd-gt-locomo-0
    dataset: LoCoMo-full-0
    method: dgd_gt
    dgd:
      dim: 256
      alpha: 1.0
      eta: 0.01
    rounds: 3
    eval_every: 1

  - name: dgd-judge-locomo-0
    dataset: LoCoMo-full-0
    method: dgd_llm_judge
    dgd:
      dim: 256
      alpha: 1.0
      eta: 0.01
    rounds: 3
    eval_every: 1
    llm_backend:
      type: deepseek
      url: https://api.deepseek.com/v1
      key: ${MEOMORY_LLM_KEY}
      model: deepseek-chat

